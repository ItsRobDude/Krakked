services:
  krakked:
    image: ${KRAKKED_IMAGE:-krakked}:${KRAKKED_IMAGE_TAG:-local}
    restart: unless-stopped
    ports:
      - "${KRAKKED_PORT:-8080}:8080"
    environment:
      KRAKKED_ENV: ${KRAKKED_ENV:-paper}
      KRAKKED_CONFIG_DIR: /krakked/config
      KRAKKED_DATA_DIR: /krakked/data
      KRAKKED_UI_HOST: ${KRAKKED_UI_HOST:-0.0.0.0}
      KRAKKED_UI_PORT: ${KRAKKED_UI_PORT:-8080}
      KRAKKED_RUNTIME_IMAGE: ${KRAKKED_IMAGE:-krakked}
      KRAKKED_RUNTIME_IMAGE_TAG: ${KRAKKED_IMAGE_TAG:-local}
      KRAKKED_RUNTIME_IMAGE_DIGEST: ${KRAKKED_IMAGE_DIGEST:-}
      KRAKKED_RUNTIME_SOURCE: ${KRAKKED_RUNTIME_SOURCE:-image}
      KRAKKED_EXPECTED_IMAGE: ${KRAKKED_EXPECTED_IMAGE:-}
      KRAKKED_EXPECTED_IMAGE_TAG: ${KRAKKED_EXPECTED_IMAGE_TAG:-}
      KRAKKED_EXPECTED_BUILD_GIT_SHA: ${KRAKKED_EXPECTED_BUILD_GIT_SHA:-}
      KRAKKED_EXPECTED_RUNTIME_SOURCE: ${KRAKKED_EXPECTED_RUNTIME_SOURCE:-}
      KRAKKED_SECRET_PW: ${KRAKKED_SECRET_PW:-}
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
      UI_DIST_DIR: /app/ui-dist
    volumes:
      - ./deploy/config:/krakked/config
      - ./deploy/data:/krakked/data
      - ./deploy/state:/krakked/state
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
