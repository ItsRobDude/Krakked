# Paper-trading overlay. Loaded when KRAKKED_ENV=paper (default).
execution:
  mode: "paper"
  validate_only: true
  allow_live_trading: false
  paper_tests_completed: false

ui:
  read_only: false

# In paper, start with the active starter pack enabled by default. vol_breakout
# and rs_rotation remain configured in the base file for manual research.
strategies:
  enabled:
    - "trend_core"
    - "majors_mean_rev"

ml:
  enabled: false

risk:
  max_open_positions: 4
  # Starter caps are conservative; rs_rotation's cap is retained for manual research.
  max_per_strategy_pct:
    trend_core: 5.0
    vol_breakout: 5.0
    majors_mean_rev: 5.0
    rs_rotation: 5.0
