# Paper-trading overlay. Loaded when KRAKKED_ENV=paper (default).
execution:
  mode: "paper"
  validate_only: true
  allow_live_trading: false
  paper_tests_completed: false

ui:
  read_only: false

# In paper, start with the full beginner starter pack enabled by default.
strategies:
  enabled:
    - "trend_core"
    - "vol_breakout"
    - "majors_mean_rev"
    - "rs_rotation"

ml:
  enabled: false

risk:
  max_open_positions: 4
  # Starter caps are conservative. rs_rotation's base config targets 20% across
  # its top 2 assets, so paper replays will clamp it unless caps are aligned.
  max_per_strategy_pct:
    trend_core: 5.0
    vol_breakout: 5.0
    majors_mean_rev: 5.0
    rs_rotation: 5.0
