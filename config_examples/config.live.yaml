# Live-trading overlay. Live submissions remain disabled unless allow_live_trading is explicitly set.
execution:
  mode: "live"
  validate_only: true        # Live mode still defaults to validate-only for safety
  allow_live_trading: false  # Flip to true only after manual verification
  paper_tests_completed: true

portfolio:
  auto_migrate_schema: false  # run `krakked portfolio-migrate` before live/paper startup

ui:
  read_only: true

# In live env, keep the same starter pack, but remain validate-only by default.
strategies:
  enabled:
    - "trend_core"
    - "vol_breakout"
    - "majors_mean_rev"
    - "rs_rotation"

ml:
  enabled: false

risk:
  max_open_positions: 4
  max_per_strategy_pct:
    trend_core: 5.0
    vol_breakout: 5.0
    majors_mean_rev: 5.0
    rs_rotation: 5.0
    manual: 20.0
