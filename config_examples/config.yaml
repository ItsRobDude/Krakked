# Base configuration shared by all environments.
region:
  code: "US_CA"
  capabilities:
    supports_margin: false
    supports_futures: false
    supports_staking: false
  default_quote: "USD"

universe:
  # Default operator starter universe. Expand later once you are comfortable.
  include_pairs:
    - "BTC/USD"
    - "ETH/USD"
    - "SOL/USD"
    - "ADA/USD"

  # Keep empty for US_CA if you want the broadest possible coverage.
  exclude_pairs: []
  min_24h_volume_usd: 100000.0

market_data:
  ws:
    url: "wss://ws.kraken.com/v2"
  ohlc_store:
    root_dir: "~/.local/share/krakked/ohlc"
    backend: "parquet"
  backfill_timeframes:
    - "1h"
    - "4h"
    - "1d"
  ws_timeframes:
    - "1m"
  metadata_path: "~/.local/share/krakked/metadata.json"

portfolio:
  base_currency: "USD"
  valuation_pairs: { }
  include_assets: []
  exclude_assets: []
  cost_basis_method: "wac"
  track_manual_trades: true
  snapshot_retention_days: 30
  reconciliation_tolerance: 1.0
  auto_migrate_schema: false

execution:
  mode: "paper"
  default_order_type: "limit"
  max_slippage_bps: 50
  time_in_force: "GTC"
  post_only: false
  validate_only: true
  allow_live_trading: false
  paper_tests_completed: false
  dead_man_switch_seconds: 600
  max_retries: 3
  retry_backoff_seconds: 2
  retry_backoff_factor: 2.0
  max_concurrent_orders: 10
  min_order_notional_usd: 20.0

# US_CA is currently configured as spot-only product scope for Krakked v1.
# That is a product decision to keep the first sellable version simpler and safer,
# not a claim that California categorically forbids every other Kraken offering.

risk:
  max_risk_per_trade_pct: 1.0
  max_portfolio_risk_pct: 10.0
  max_open_positions: 4
  max_per_asset_pct: 5.0
  max_per_strategy_pct:
    trend_core: 5.0
    vol_breakout: 5.0
    majors_mean_rev: 5.0
    rs_rotation: 5.0
    manual: 20.0
  max_daily_drawdown_pct: 10.0
  kill_switch_on_drift: true
  include_manual_positions: true
  volatility_lookback_bars: 20
  min_liquidity_24h_usd: 100000.0

strategies:
  enabled:
    - "trend_core"
    - "vol_breakout"
    - "majors_mean_rev"
    - "rs_rotation"
  configs:
    trend_core:
      name: "trend_core"
      type: "trend_following"
      enabled: true
      params:
        # Empty => use full discovered universe
        pairs: []
        risk_profile: "balanced"
        timeframes: ["1h", "4h"]
        ma_fast: 10
        ma_slow: 20
        regime_timeframe: "1d"
        min_trend_strength_bps: 15
      userref: 1001

    vol_breakout:
      name: "vol_breakout"
      type: "vol_breakout"
      enabled: true
      params:
        pairs: ["BTC/USD", "ETH/USD", "SOL/USD", "ADA/USD"]
        timeframes: ["15m", "1h"]
        lookback_bars: 20
        min_compression_bps: 10.0
        breakout_multiple: 1.5
      userref: 1002

    majors_mean_rev:
      name: "majors_mean_rev"
      type: "mean_reversion"
      enabled: true
      params:
        pairs: ["BTC/USD", "ETH/USD"]
        timeframe: "1h"
        lookback_bars: 50
        band_width_bps: 150
      userref: 1003

    rs_rotation:
      name: "rs_rotation"
      type: "relative_strength"
      enabled: true
      params:
        pairs: ["BTC/USD", "ETH/USD", "SOL/USD", "ADA/USD"]
        lookback_bars: 42
        timeframe: "4h"
        rebalance_interval_hours: 24
        top_n: 2
        total_allocation_pct: 20.0
      userref: 1004

    ai_predictor_alt:
      name: "ai_predictor_alt"
      type: "machine_learning_alt"
      enabled: false
      params:
        pairs: []                # full discovered universe
        timeframe: "1h"
        lookback_bars: 60
        short_window: 5
        long_window: 20
        target_exposure_usd: null
        continuous_learning: true
        max_positions: 2            # per-strategy cap; risk.max_open_positions still applies
      userref: 1101

    ai_regression:
      name: "ai_regression"
      type: "machine_learning_regression"
      enabled: false
      params:
        pairs: []                # full discovered universe
        timeframe: "1h"
        lookback_bars: 60
        short_window: 5
        long_window: 20
        target_exposure_usd: null
        continuous_learning: true
        max_positions: 2            # per-strategy cap; risk.max_open_positions still applies
      userref: 1102

ui:
  enabled: true
  host: "127.0.0.1"
  port: 8080
  base_path: "/"
  auth:
    enabled: false
    token: ""
  read_only: false
  refresh_intervals:
    dashboard_ms: 5000
    orders_ms: 5000
    strategies_ms: 10000

ml:
  enabled: false
